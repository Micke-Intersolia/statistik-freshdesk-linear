project:
  path: "C:\\Users\\michael.brostrom\\Documents\\GitHub\\statistik-freshdesk-linear"
  raw_dir: "raw"
  data_dir: "data"
  logs_dir: "logs"
  timestamp_format: "YYYYMMDDTHHMMSSZ"

credentials:
  linear_key_path: "credentials/Linear_API-key.txt"
  freshdesk_key_path: "credentials/Freshdesk_API-key.txt"
  note: "API keys are stored as plain key text files. Linear expects the key alone in Authorization header."

snapshot:
  filename_pattern: "{system}_raw_{timestamp}.json"
  systems:
    - linear
    - freshdesk
  behavior:
    raw: "Save full API response JSON to raw/<system>/<filename>"
    data: "Append normalized rows to data/<system>/<file>.csv (append-only)"
    atomic_writes: true

